name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semver tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release with macOS DMG
    runs-on: macos-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          tag="$REF_NAME"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          fi

          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release tag must look like v0.1.0, got: $tag" >&2
              exit 1
              ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          artifacts=(release/*.dmg)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No DMG artifacts found in release/." >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${artifacts[@]}" --clobber
          else
            gh release create "$TAG" "${artifacts[@]}" \
              --verify-tag \
              --generate-notes \
              --title "$TAG"
          fi
